<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #8888aa;
        }

        .clock {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.05em;
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .links a {
            color: #8888aa;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .links a:hover {
            color: #ffffff;
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting" id="greeting"></div>
        <div class="clock" id="clock"></div>
        <div class="links">
            <a href="https://www.bbc.co.uk/news">BBC News</a>
            <a href="https://gmail.com">Gmail</a>
            <a href="https://claude.ai">Claude</a>
            <a href="https://platform.walr.com/">Walr</a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting;
            if (hour < 12) greeting = 'Good morning, Tom';
            else if (hour < 18) greeting = 'Good afternoon, Tom';
            else greeting = 'Good evening, Tom';
            document.getElementById('greeting').textContent = greeting;
        }

        updateClock();
        updateGreeting();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
