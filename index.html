<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #8888aa;
        }

        .clock {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.05em;
        }

        .date {
            font-size: 1rem;
            font-weight: 300;
            color: #8888aa;
            margin-top: 0.25rem;
        }

        .weather {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #8888aa;
            font-weight: 300;
        }

        .weather-temp {
            font-size: 1.8rem;
            color: #e0e0e0;
            font-weight: 200;
        }

        .quote {
            margin-top: 1.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .quote-text {
            font-size: 0.95rem;
            font-style: italic;
            color: #9999bb;
            line-height: 1.6;
        }

        .quote-author {
            font-size: 0.8rem;
            color: #666688;
            margin-top: 0.4rem;
        }

        .links {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .links a {
            color: #8888aa;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.75rem 0.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .links a:hover {
            color: #ffffff;
            border-color: #666;
            background: rgba(255, 255, 255, 0.03);
        }

        .links img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting" id="greeting"></div>
        <div class="clock" id="clock"></div>
        <div class="date" id="date"></div>
        <div class="weather" id="weather">Loading weather...</div>
        <div class="quote" id="quote">Loading quote...</div>
        <div class="links">
            <a href="https://www.bbc.co.uk/news">
                <img src="https://www.google.com/s2/favicons?domain=bbc.co.uk&sz=64" alt="">
                BBC News
            </a>
            <a href="https://gmail.com">
                <img src="https://www.google.com/s2/favicons?domain=gmail.com&sz=64" alt="">
                Gmail
            </a>
            <a href="https://claude.ai">
                <img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=64" alt="">
                Claude
            </a>
            <a href="https://github.com">
                <img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="">
                GitHub
            </a>
        </div>
    </div>

    <script>
        // ---- CLOCK ----
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }

        // ---- DATE ----
        function updateDate() {
            const now = new Date();
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const months = ['January','February','March','April','May','June',
                           'July','August','September','October','November','December'];
            const text = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
            document.getElementById('date').textContent = text;
        }

        // ---- GREETING ----
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting;
            if (hour < 12) greeting = 'Good morning, Tom';
            else if (hour < 18) greeting = 'Good afternoon, Tom';
            else greeting = 'Good evening, Tom';
            document.getElementById('greeting').textContent = greeting;
        }

        // ---- WEATHER ----
        async function fetchWeather() {
            const apiKey = '1f16fe94253a7bfb67123eef0bb70915';
            const city = 'Ferndown,GB';
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                const temp = Math.round(data.main.temp);
                const description = data.weather[0].description;

                document.getElementById('weather').innerHTML =
                    `<span class="weather-temp">${temp}°C</span><br>${description}`;
            } catch (error) {
                document.getElementById('weather').textContent = 'Weather unavailable';
            }
        }

        // ---- DAILY QUOTE ----
        function showQuote() {
            const quotes = [
                { text: "The best way to predict the future is to invent it.", author: "Alan Kay" },
                { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
                { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
                { text: "Not everything that counts can be counted.", author: "William Bruce Cameron" },
                { text: "The question isn't who is going to let me; it's who is going to stop me.", author: "Ayn Rand" },
                { text: "Well done is better than well said.", author: "Benjamin Franklin" },
                { text: "If you want to go fast, go alone. If you want to go far, go together.", author: "African Proverb" },
                { text: "Stay hungry, stay foolish.", author: "Stewart Brand" }
            ];

            // Pick a quote based on the date so it changes daily but stays the same all day
            const today = new Date();
            const dayIndex = (today.getFullYear() * 366 + today.getMonth() * 31 + today.getDate()) % quotes.length;
            const quote = quotes[dayIndex];

            document.getElementById('quote').innerHTML =
                `<div class="quote-text">"${quote.text}"</div>
                 <div class="quote-author">— ${quote.author}</div>`;
        }

        // ---- RUN EVERYTHING ----
        updateClock();
        updateDate();
        updateGreeting();
        fetchWeather();
        showQuote();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
