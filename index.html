<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .container {
            text-align: center;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #8888aa;
        }

        .clock {
            font-size: 5rem;
            font-weight: 200;
            letter-spacing: 0.05em;
        }

        .weather {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #8888aa;
            font-weight: 300;
        }

        .weather-temp {
            font-size: 1.8rem;
            color: #e0e0e0;
            font-weight: 200;
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .links a {
            color: #8888aa;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .links a:hover {
            color: #ffffff;
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting" id="greeting"></div>
        <div class="clock" id="clock"></div>
        <div class="weather" id="weather">Loading weather...</div>
        <div class="links">
            <a href="https://www.bbc.co.uk/news">BBC News</a>
            <a href="https://gmail.com">Gmail</a>
            <a href="https://claude.ai">Claude</a>
            <a href="https://github.com">GitHub</a>
        </div>
    </div>

    <script>
        // ---- CLOCK ----
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }

        // ---- GREETING ----
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting;
            if (hour < 12) greeting = 'Good morning, Tom';
            else if (hour < 18) greeting = 'Good afternoon, Tom';
            else greeting = 'Good evening, Tom';
            document.getElementById('greeting').textContent = greeting;
        }

        // ---- WEATHER ----
        async function fetchWeather() {
            const apiKey = '1f16fe94253a7bfb67123eef0bb70915';
            const city = 'Ferndown,GB';
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                const temp = Math.round(data.main.temp);
                const description = data.weather[0].description;

                document.getElementById('weather').innerHTML =
                    `<span class="weather-temp">${temp}°C</span><br>${description}`;
            } catch (error) {
                document.getElementById('weather').textContent = 'Weather unavailable';
            }
        }

        // ---- RUN EVERYTHING ----
        updateClock();
        updateGreeting();
        fetchWeather();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
</html>
